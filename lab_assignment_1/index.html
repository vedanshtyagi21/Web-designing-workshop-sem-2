<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MT-1 web dev assignment</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f4f4;
        }

        #container {
            text-align: center;
            margin: auto;
            padding: 20px;
            border: 1px;
            border-radius: 10px;
            background: white;
        }

        #result {
            margin: 20px;
            color: #333;
            text-align: center;
            border: 1px;
        }

        #button {
            margin: 15px;
            color: blue;
        }
    </style>
</head>

<body>
    <div id="container">
        <h1>Sum of N numbers</h1>
        <form id="sumForm">
            <label for="numberInput">Enter a number:</label>
            <input type="number" id="numberInput" required>
            <div id="button">
                <button type="button" id="add">Add to List</button>
                <button type="button" id="calculate">Calculate Sum</button>
            </div>
        </form>
    </div>
    <div id="result"></div>

    <script>
        const numberInput = document.getElementById('numberInput');
        const addButton = document.getElementById('add');
        const calculateButton = document.getElementById('calculate');
        const result = document.getElementById('result');
        let numbers = [];

        addButton.addEventListener('click', () => {
            const number = parseFloat(numberInput.value);
            if (!isNaN(number)) {
                numbers.push(number);
                numberInput.value = '';
                result.innerHTML = `Added ${number}. (Total numbers: ${numbers.length})`;
            } else {
                alert('Please enter a valid number.');
            }
        });

        calculateButton.addEventListener('click', () => {
            if (numbers.length === 0) {
                result.innerHTML = "Please add at least one number first.";
                return;
            }
            const sum = numbers.reduce((acc, curr) => acc + curr, 0);
            result.innerHTML = `Total Sum: ${sum}`;
        });
    </script>
</body>

</html>
